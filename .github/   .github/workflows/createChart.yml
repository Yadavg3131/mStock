name: EOD Journal

on:
  schedule:
    - cron: '15 10 * * 1-5'   # 15:45 IST (10:15 UTC), Mon-Fri
  workflow_dispatch:           # Adds a "Run workflow" button in the Actions tab

jobs:
  run-journal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google service-account key
        run: echo "$GOOGLE_SECRET_JSON" > google_secret_key.json
        env:
          GOOGLE_SECRET_JSON: ${{ secrets.GOOGLE_SECRET_JSON }}

      - name: Run EOD journal
        env:
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: python generateChart.py
