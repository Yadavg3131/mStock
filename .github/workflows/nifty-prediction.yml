name: NIFTY Daily Prediction

on:
  schedule:
    # 08:30 IST (03:00 UTC), Monday–Friday
    # S&P 500, DXY, US10Y all closed by this time. ~45min buffer before NIFTY opens.
    - cron: '0 3 * * 1-5'
  workflow_dispatch:

# Prevent overlapping runs (manual + scheduled at same time)
concurrency:
  group: nifty-prediction
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TZ: Asia/Kolkata
      PYTHONUNBUFFERED: '1'
      PIP_DISABLE_PIP_VERSION_CHECK: '1'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          GOOGLE_SECRET_JSON: ${{ secrets.GOOGLE_SECRET_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          missing=0
          if [ -z "$GOOGLE_SECRET_JSON" ]; then
            echo "::error title=Missing secret::GOOGLE_SECRET_JSON is not set"
            missing=1
          fi
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "::error title=Missing secret::TELEGRAM_BOT_TOKEN is not set"
            missing=1
          fi
          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::error title=Missing secret::TELEGRAM_CHAT_ID is not set"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo "Add missing secret(s) under Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "All required secrets present."

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Google service-account key
        env:
          GOOGLE_SECRET_JSON: ${{ secrets.GOOGLE_SECRET_JSON }}
        run: |
          printf '%s' "$GOOGLE_SECRET_JSON" > google_secret_key.json
          chmod 600 google_secret_key.json
          python -c "import json; json.load(open('google_secret_key.json')); print('Credentials JSON OK.')"

      - name: Run NIFTY prediction
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p logs
          set -o pipefail
          python -u nifty_predict_v2.py daily 2>&1 | tee "logs/predict-$(date +%Y%m%d-%H%M%S).log"

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nifty-prediction-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14
          if-no-files-found: ignore

      - name: Clean up credential file
        if: always()
        run: |
          rm -f google_secret_key.json
          echo "Credential file removed."
